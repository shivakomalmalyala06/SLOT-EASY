<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Confirmed | Slot Easy</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="center-screen">
      <section class="panel" style="max-width: 560px; width: 100%;">
        <div class="checkmark-animation"></div>
        <h1 style="text-align: center; color: var(--primary); margin-top: 20px;">Your appointment is confirmed!</h1>
        <p class="section-lead" style="text-align: center;">A detailed confirmation email has been sent to your inbox. Check your spam folder if you don't see it.</p>
        <div id="bookingSummary" class="card" style="background: linear-gradient(135deg, rgba(13, 148, 136, 0.05) 0%, rgba(13, 148, 136, 0.02) 100%); border-left: 4px solid var(--primary);"></div>
        <p class="meta" id="confirmationMeta" style="text-align: center; color: var(--text-soft); margin-top: 20px;"></p>
        <br />
        <a href="booking.html" class="btn btn-primary" style="width: 100%; text-align: center;">📅 Book Another Appointment</a>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
